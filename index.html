<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cadastre seu veiculo para vender mais rápido!</h1>
    </header>
    <main>
        <section id="formulario">
            <h2>Venda facil o seu carro</h2>
            <form action="#" method="post">
                <label for="title">Título: <span class="required">*</span></label>
                <input 
                type="text" 
                id="title" 
                name="title" 
                class="block" 
                placeholder="Digite um titulo para anunciar o seu carro"
                minlength="1"
                maxlength="30"
                required
                />
                <input type="submit" value="enviar">
            </form>
        </section>
    </main>
    <footer>
        <p>Desenvolvido por Karen Araujo ❤️</p>
    </footer>
</body>
</html>
